services:
    ai-agent:
        build:
            context: ./ai-agent
            dockerfile: Dockerfile
        container_name: jarvis-ai-agent
        ports:
            - "3000:3000"
        volumes:
            - ./ai-agent:/app
            - /app/node_modules
            - /var/run/docker.sock:/var/run/docker.sock
        environment:
            - PORT=3000
            - OLLAMA_API_URL=${OLLAMA_API_URL:-http://host.docker.internal:11434}
            - DATABASE_URL=file:./dev.db
        extra_hosts:
            - "host.docker.internal:host-gateway"
        restart: unless-stopped

    dashboard:
        build:
            context: ./dashboard
            dockerfile: Dockerfile
        container_name: jarvis-dashboard
        ports:
            - "3001:3001"
        volumes:
            - ./dashboard:/app
            - /app/node_modules
            - /app/.next
        environment:
            - NEXT_PUBLIC_API_URL=/api
            - BACKEND_INTERNAL_URL=http://ai-agent:3000
            - PORT=3001
        depends_on:
            - ai-agent
        restart: unless-stopped
